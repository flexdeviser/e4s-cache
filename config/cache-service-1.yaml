# E4S Cache Service Configuration

# Service identification
serviceId: cache-service-1
serviceGroup: e4s-cache
host: localhost
port: 9090

# Cache configuration
cache:
  maxChunks: 2000000              # Maximum number of chunks (2 million)
  chunkIntervalHours: 24         # Time interval per chunk in hours (1 day)
  maxMemoryBytes: 107374182400    # Maximum memory in bytes (100GB)

# Redis configuration for distributed locking and service discovery
redis:
  host: localhost
  port: 46379
