# E4S Cache Service Configuration

# Service identification
serviceId: cache-service-3
serviceGroup: e4s-cache
host: localhost
port: 9092

# Cache configuration
cache:
  maxChunks: 2000000              # Maximum number of chunks (2 million)
  chunkIntervalHours: 24         # Time interval per chunk in hours (1 day)
  maxMemoryBytes: 107374182400    # Maximum memory in bytes (100GB)

# Redis configuration for distributed locking
redis:
  host: localhost
  port: 6379

# Health monitoring configuration
health:
  checkIntervalMs: 5000           # Health check interval in milliseconds (5 seconds)

# Peer services (other cache services in the cluster)
peers:
  - id: cache-service-1
    host: localhost
    port: 9090
  - id: cache-service-2
    host: localhost
    port: 9091
